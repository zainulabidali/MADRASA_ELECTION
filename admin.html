<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Madrasah Election System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-data-card {
            background: rgba(20, 25, 35, 0.4);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            border-top: 4px solid var(--primary-accent);
        }
        .admin-data-card .position-title {
            padding-bottom: 10px;
        }
        .action-btns {
            display: flex;
            gap: 8px;
        }
    </style>
</head>

<body>
    <div class="container glass-panel" style="max-width: 1000px;">
        <div class="top-bar">
            <a href="index.html" class="back-btn">
                <svg width="30" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
               
            </a>
            <h1 style="margin: 0; font-size: 15px;">Admin Panel</h1>
            <button onclick="resetAllVotes()" class="btn btn-danger btn-sm" style="display:flex; align-items:center; gap:5px;">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                Reset Votes
            </button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
            <!-- Add Position Form -->
            <div class="position-card" style="border-left: none; border-top: 4px solid var(--warning); background:rgba(0,0,0,0.2);">
                <h2 style="font-size: 18px; margin-bottom: 15px;">Add New Category</h2>
                <div class="form-group">
                    <input type="text" id="posTitle" class="form-control" placeholder="e.g. Madrasa Leader">
                </div>
                <button onclick="addPosition()" class="btn btn-primary" style="width: 100%;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Add Category
                </button>
            </div>

            <!-- Add Candidate Form -->
            <div class="position-card" style="border-left: none; border-top: 4px solid var(--success); background:rgba(0,0,0,0.2);">
                <h2 style="font-size: 18px; margin-bottom: 15px;">Add Candidate</h2>
                <div class="form-group">
                    <select id="candPosition" class="form-select"></select>
                </div>
                <div class="form-group">
                    <input type="text" id="candName" class="form-control" placeholder="Candidate Name">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group text-secondary" style="font-size: 12px;">
                        <label>Photo</label>
                        <input type="file" id="candPhoto" class="file-input" accept="image/*">
                    </div>
                    <div class="form-group text-secondary" style="font-size: 12px;">
                        <label>Symbol (Optional)</label>
                        <input type="file" id="candSymbol" class="file-input" accept="image/*">
                    </div>
                </div>
                <button onclick="addCandidate()" class="btn btn-success" style="width: 100%;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                    Add Candidate
                </button>
            </div>
        </div>

        <div class="header" style="margin-top: 40px; text-align: left; padding-bottom: 10px;">
            <h2>Current Election Data</h2>
        </div>

        <div id="dataView"></div>
    </div>

    <!-- Modals -->
    <!-- Edit Category Modal -->
    <div id="editPosModal" class="modal-overlay">
        <div class="glass-card modal-content">
            <div class="modal-header">Edit Category</div>
            <input type="hidden" id="editPosId">
            <div class="form-group">
                <label>Category Title</label>
                <input type="text" id="editPosTitle" class="form-control">
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeEditPosModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEditPos()">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Edit Candidate Modal -->
    <div id="editCandModal" class="modal-overlay">
        <div class="glass-card modal-content">
            <div class="modal-header">Edit Candidate</div>
            <input type="hidden" id="editCandPosId">
            <input type="hidden" id="editCandId">
            <div class="form-group">
                <label>Candidate Name</label>
                <input type="text" id="editCandName" class="form-control">
            </div>
            <div class="form-group">
                <label>Update Photo (Leave empty to keep current)</label>
                <input type="file" id="editCandPhoto" class="file-input" accept="image/*">
            </div>
            <div class="form-group">
                <label>Update Symbol (Leave empty to keep current)</label>
                <input type="file" id="editCandSymbol" class="file-input" accept="image/*">
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeEditCandModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEditCand()" id="saveCandBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Admin UI Scripts
        function loadAdminUI() {
            const data = db.getData();

            // Populate Dropdown
            const select = document.getElementById('candPosition');
            select.innerHTML = '<option value="">-- Select Category --</option>';
            data.positions.forEach(pos => {
                select.innerHTML += `<option value="${pos.id}">${pos.title}</option>`;
            });

            // Render Data View
            const dataView = document.getElementById('dataView');
            dataView.innerHTML = '';

            if (data.positions.length === 0) {
                dataView.innerHTML = '<p style="color: var(--text-secondary); text-align: center; margin-top: 20px;">No categories added yet. Add a category above to get started.</p>';
            }

            data.positions.forEach(pos => {
                let html = `
                <div class="admin-data-card">
                    <div class="position-title">
                        <span><b style="color: var(--warning);">[Cat]</b> ${pos.title}</span>
                        <div class="action-btns">
                            <button onclick="openEditPosModal('${pos.id}', '${pos.title.replace(/'/g, "\\'")}')" title="Edit" class="btn-icon edit-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <button onclick="deletePosition('${pos.id}')" title="Delete" class="btn-icon del-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="candidate-list">`;

                if (pos.candidates.length === 0) {
                    html += `<p style="color: #666; font-style: italic; font-size: 14px; margin-top: 10px;">No candidates added to this category.</p>`;
                } else {
                    pos.candidates.forEach(cand => {
                        html += `
                        <div class="candidate-row" style="padding: 8px 12px;">
                            ${cand.photo ? `<img src="${cand.photo}" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">` : `<div style="width: 40px; height: 40px; background: #333; border-radius: 50%;"></div>`}
                            <div class="candidate-info" style="padding: 0 10px;">
                                <div style="font-size: 16px; font-weight: bold;">${cand.name}</div>
                                <div style="font-size: 12px; color: var(--text-secondary);">Votes: <span style="color: var(--success); font-weight: bold;">${cand.votes}</span></div>
                            </div>
                            <div class="action-btns">
                                <button onclick="openEditCandModal('${pos.id}', '${cand.id}', '${cand.name.replace(/'/g, "\\'")}')" title="Edit Candidate" class="btn-icon edit-icon">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                </button>
                                <button onclick="deleteCandidate('${pos.id}', '${cand.id}')" title="Delete Candidate" class="btn-icon del-icon">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                </button>
                            </div>
                        </div>`;
                    });
                }

                html += `</div></div>`;
                dataView.innerHTML += html;
            });
        }

        // Add
        function addPosition() {
            const input = document.getElementById('posTitle');
            const title = input.value.trim();
            if (!title) return alert("Enter a category title!");

            const data = db.getData();
            data.positions.push({
                id: db.generateId(),
                title: title,
                candidates: []
            });

            db.saveData(data);
            input.value = '';
            loadAdminUI();
        }

        async function addCandidate() {
            const posId = document.getElementById('candPosition').value;
            const name = document.getElementById('candName').value.trim();
            const photoInput = document.getElementById('candPhoto');
            const symbolInput = document.getElementById('candSymbol');

            if (!posId) return alert("Please select a category first!");
            if (!name) return alert("Please enter the candidate's name!");

            try {
                const photoBtn = document.querySelector('button[onclick="addCandidate()"]');
                photoBtn.innerHTML = "Processing...";
                photoBtn.disabled = true;

                const photo = photoInput.files.length > 0 ? await fileToBase64(photoInput.files[0]) : "";
                const symbol = symbolInput.files.length > 0 ? await fileToBase64(symbolInput.files[0]) : "";

                const data = db.getData();
                const pos = data.positions.find(p => p.id === posId);

                if (pos) {
                    pos.candidates.push({
                        id: db.generateId(),
                        name: name,
                        photo: photo,
                        symbol: symbol,
                        votes: 0
                    });
                    db.saveData(data);

                    // Reset Form
                    document.getElementById('candPosition').value = '';
                    document.getElementById('candName').value = '';
                    photoInput.value = '';
                    symbolInput.value = '';
                    loadAdminUI();
                }

                photoBtn.innerHTML = "Add Candidate";
                photoBtn.disabled = false;
            } catch (e) {
                console.error("Error base64 image conversion", e);
                alert("Failed to process image file. Ensure it is a valid image.");
                const photoBtn = document.querySelector('button[onclick="addCandidate()"]');
                photoBtn.innerHTML = "Add Candidate";
                photoBtn.disabled = false;
            }
        }

        // Edit Position
        function openEditPosModal(id, currentTitle) {
            document.getElementById('editPosId').value = id;
            document.getElementById('editPosTitle').value = currentTitle;
            document.getElementById('editPosModal').classList.add('active');
        }
        function closeEditPosModal() {
            document.getElementById('editPosModal').classList.remove('active');
        }
        function saveEditPos() {
            const id = document.getElementById('editPosId').value;
            const newTitle = document.getElementById('editPosTitle').value.trim();
            if(!newTitle) return alert("Title cannot be empty");

            const data = db.getData();
            const pos = data.positions.find(p => p.id === id);
            if(pos) {
                pos.title = newTitle;
                db.saveData(data);
                loadAdminUI();
                closeEditPosModal();
            }
        }

        // Edit Candidate
        function openEditCandModal(posId, candId, currentName) {
            document.getElementById('editCandPosId').value = posId;
            document.getElementById('editCandId').value = candId;
            document.getElementById('editCandName').value = currentName;
            document.getElementById('editCandPhoto').value = '';
            document.getElementById('editCandSymbol').value = '';
            document.getElementById('editCandModal').classList.add('active');
        }
        function closeEditCandModal() {
            document.getElementById('editCandModal').classList.remove('active');
        }
        async function saveEditCand() {
            const posId = document.getElementById('editCandPosId').value;
            const candId = document.getElementById('editCandId').value;
            const newName = document.getElementById('editCandName').value.trim();
            const photoInput = document.getElementById('editCandPhoto');
            const symbolInput = document.getElementById('editCandSymbol');

            if(!newName) return alert("Candidate Name cannot be empty");

            try {
                const btn = document.getElementById('saveCandBtn');
                btn.innerText = "Saving...";
                btn.disabled = true;

                const data = db.getData();
                const pos = data.positions.find(p => p.id === posId);
                const cand = pos ? pos.candidates.find(c => c.id === candId) : null;

                if (cand) {
                    cand.name = newName;
                    if(photoInput.files.length > 0) {
                        cand.photo = await fileToBase64(photoInput.files[0]);
                    }
                    if(symbolInput.files.length > 0) {
                        cand.symbol = await fileToBase64(symbolInput.files[0]);
                    }
                    db.saveData(data);
                    loadAdminUI();
                    closeEditCandModal();
                }

                btn.innerText = "Save Changes";
                btn.disabled = false;
            } catch (e) {
                console.error("Error", e);
                alert("Failed to process images.");
                const btn = document.getElementById('saveCandBtn');
                btn.innerText = "Save Changes";
                btn.disabled = false;
            }
        }

        // Deletes
        function deletePosition(posId) {
            if (!confirm("Are you sure you want to completely delete this category and all its candidates?")) return;
            const data = db.getData();
            data.positions = data.positions.filter(p => p.id !== posId);
            db.saveData(data);
            loadAdminUI();
        }

        function deleteCandidate(posId, candId) {
            if (!confirm("Remove this candidate?")) return;
            const data = db.getData();
            const pos = data.positions.find(p => p.id === posId);
            if (pos) {
                pos.candidates = pos.candidates.filter(c => c.id !== candId);
                db.saveData(data);
                loadAdminUI();
            }
        }

        function resetAllVotes() {
            if (!confirm("⚠️ WARNING: This will reset ALL votes to ZERO! Are you absolutely sure?")) return;
            const data = db.getData();
            let count = 0;
            data.positions.forEach(pos => {
                pos.candidates.forEach(cand => {
                    cand.votes = 0;
                    count++;
                });
            });
            db.saveData(data);
            alert(`Successfully reset votes for ${count} candidates.`);
            loadAdminUI();
        }

        // Add responsiveness to grid layout via CSS injected dynamically
        const style = document.createElement('style');
        style.innerHTML = `
            @media (max-width: 768px) {
                .container > div[style*="grid-template-columns: 1fr 1fr;"] {
                    grid-template-columns: 1fr !important;
                }
            }
        `;
        document.head.appendChild(style);

        // Init
        document.addEventListener('DOMContentLoaded', loadAdminUI);
    </script>
</body>

</html>
