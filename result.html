<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Election Results</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container glass-panel" style="max-width: 800px;">
        <div class="top-bar">
            <a href="index.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back
            </a>
            <h1 style="margin: 0; font-size: 24px;">📊 LIVE RESULTS</h1>
            <button onclick="toggleFullScreen()" class="btn btn-sm">
                 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                Fullscreen
            </button>
        </div>

        <div id="resultsContainer">
            <!-- Results rendered here -->
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function loadResults() {
            const data = db.getData();
            const container = document.getElementById('resultsContainer');

            if (data.positions.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#888; margin-top: 50px;"><h2>No election data available.</h2></div>';
                return;
            }

            let html = '';

            data.positions.forEach(pos => {
                const maxVotes = pos.candidates.length > 0 ? Math.max(...pos.candidates.map(c => c.votes)) : 0;
                const totalVotes = pos.candidates.reduce((sum, c) => sum + c.votes, 0);

                html += `
                <div class="result-card glass-card">
                    <div class="position-title">
                        <span>${pos.title}</span>
                        ${totalVotes > 0 ? `<span class="winner-badge" style="margin:0;">🏆 Top Leading: ${pos.candidates.find(c => c.votes === maxVotes)?.name || 'Tie'}</span>` : ''}
                    </div>
                `;

                if (pos.candidates.length === 0) {
                    html += `<p style="color: #666; text-align: center;">No candidates.</p>`;
                } else {
                    // Sort candidates by votes (descending)
                    const sortedCandidates = [...pos.candidates].sort((a, b) => b.votes - a.votes);

                    sortedCandidates.forEach(cand => {
                        const isWinner = totalVotes > 0 && cand.votes === maxVotes;
                        const percentage = totalVotes > 0 ? ((cand.votes / totalVotes) * 100).toFixed(1) : 0;

                        html += `
                        <div class="result-candidate-row ${isWinner ? 'is-winner' : ''}">
                            ${cand.photo ? `<img src="${cand.photo}" class="result-avatar">` : `<div class="result-avatar"></div>`}
                            <div class="result-candidate-info">
                                <div style="display: flex; justify-content: space-between; align-items: baseline;">
                                    <div style="font-size: 18px; font-weight: bold;">
                                        ${cand.name}
                                        ${isWinner ? '<span class="winner-badge">🏆 Leading</span>' : ''}
                                    </div>
                                    <div style="font-size: 14px; color: var(--text-secondary);">${percentage}%</div>
                                </div>
                                <div class="progress-track">
                                    <div class="progress-fill ${isWinner ? 'winner' : ''}" style="width: ${percentage}%"></div>
                                </div>
                            </div>
                            <div class="vote-count">
                                ${cand.votes}
                            </div>
                        </div>
                        `;
                    });
                }

                html += `</div>`;
            });

            container.innerHTML = html;
        }

        // Initial Load
        document.addEventListener('DOMContentLoaded', () => {
            loadResults();
            // Auto-refresh every 1 second
            setInterval(loadResults, 1000);
        });
    </script>
</body>

</html>
