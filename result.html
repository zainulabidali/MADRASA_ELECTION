<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Election Results</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container" style="max-width: 800px;">
        <div class="top-bar">
            <a href="index.html" class="back-btn">⬅ Back to Home</a>
            <h1 style="margin: 0; font-size: 24px;">📊 Live Results</h1>
            <button onclick="toggleFullScreen()" class="btn"
                style="padding: 5px 10px; font-size: 14px; min-height: 30px;">Fullscreen</button>
        </div>

        <div id="resultsContainer">
            <!-- Results rendered here -->
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function loadResults() {
            const data = db.getData();
            const container = document.getElementById('resultsContainer');

            if (data.positions.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#888; margin-top: 50px;"><h2>No election data available.</h2></div>';
                return;
            }

            let html = '';

            data.positions.forEach(pos => {
                html += `
                <div class="result-card">
                    <div class="position-title" style="margin-bottom: 20px;">
                        <span>${pos.title}</span>
                    </div>
                `;

                if (pos.candidates.length === 0) {
                    html += `<p style="color: #666; text-align: center;">No candidates.</p>`;
                } else {
                    // Find max votes for winner highlighting
                    const maxVotes = Math.max(...pos.candidates.map(c => c.votes));
                    const totalVotes = pos.candidates.reduce((sum, c) => sum + c.votes, 0);

                    // Sort candidates by votes (descending)
                    const sortedCandidates = [...pos.candidates].sort((a, b) => b.votes - a.votes);

                    sortedCandidates.forEach(cand => {
                        const isWinner = totalVotes > 0 && cand.votes === maxVotes;
                        const percentage = totalVotes > 0 ? ((cand.votes / totalVotes) * 100).toFixed(1) : 0;

                        html += `
                        <div class="result-candidate-row" style="border: ${isWinner ? '1px solid var(--success)' : '1px solid #333'};">
                            ${cand.photo ? `<img src="${cand.photo}" style="width: 50px; height: 50px; border-radius: 5px; object-fit: cover;">` : `<div style="width:50px; height:50px; background:#444; border-radius:5px;"></div>`}
                            <div class="result-candidate-info">
                                <div style="display: flex; justify-content: space-between; align-items: baseline;">
                                    <div style="font-size: 18px; font-weight: bold;">
                                        ${cand.name}
                                        ${isWinner ? '<span class="winner-badge">🏆 Leading</span>' : ''}
                                    </div>
                                    <div style="font-size: 14px; color: var(--text-secondary);">${percentage}%</div>
                                </div>
                                <div class="progress-track">
                                    <div class="progress-fill ${isWinner ? 'winner' : ''}" style="width: ${percentage}%"></div>
                                </div>
                            </div>
                            <div class="vote-count" style="${isWinner ? 'color: var(--success);' : ''}">
                                ${cand.votes}
                            </div>
                        </div>
                        `;
                    });
                }

                html += `</div>`;
            });

            container.innerHTML = html;
        }

        // Initial Load
        document.addEventListener('DOMContentLoaded', () => {
            loadResults();
            // Auto-refresh every 1 second
            setInterval(loadResults, 1000);
        });
    </script>
</body>

</html>
